# -----------------------------------------------------------------------------
#                        SLAM system definition for MOLA
#
# This file just replays (no SLAM) the raw data of a sequence of the KITTI dataset
# -----------------------------------------------------------------------------

modules:
  # =====================
  # KittiOdometryDataset
  # =====================
  - type: mola::KittiOdometryDataset
    name: dataset_input
    execution_rate: 20 # Hz
    #export_to_rawlog: kitti_${KITTI_SEQ}.rawlog
    #verbosity_level: INFO
    gui_preview_sensors:
      - raw_sensor_label: lidar
        decimation: 1
        win_pos: 5 70 400 400
      - raw_sensor_label: image_0
        decimation: 1
        win_pos: 5 370 600 200
      - raw_sensor_label: image_1
        decimation: 1
        win_pos: 5 500 600 200
    params:
      base_dir: ${KITTI_BASE_DIR}
      sequence: ${KITTI_SEQ}
      time_warp_scale: 1.0
      start_paused: ${MOLA_DATASET_START_PAUSED|false}
      publish_lidar: true
      publish_image_0: true
      publish_image_1: true
      publish_ground_truth: true

  # =====================
  # MolaViz
  # =====================
  - name: viz
    type: ${MOLA_GUI_MODULE|mola::MolaVizImGui}
    verbosity_level: DEBUG
    params:
      # Persist ImGui window layout and docking state to
      # $XDG_CONFIG_HOME/mola/imgui_<imgui_app_name>.ini (or
      # $HOME/.config/mola/imgui_<imgui_app_name>.ini) across runs.
      # Use a distinct name per launch config so different apps don't
      # overwrite each other's layouts.  Set to "" to disable persistence.
      imgui_app_name: kitti_replay
